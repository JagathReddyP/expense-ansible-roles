- name: remove existing app location 
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: absent
  ignore_errors: true #because if you running first time there may be no app directory

- name: Create a app directory if it does not exist
  ansible.builtin.file:
    path: "{{ app_location }}"
    state: directory

- name: "Download {{ component }} code"
  ansible.builtin.unarchive:
    src: "https://expense-builds.s3.us-east-1.amazonaws.com/expense-{{ component }}-v2.zip"
    dest: "{{ app_location }}"
    remote_src: yes
